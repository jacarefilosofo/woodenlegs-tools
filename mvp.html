<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Woodenlegs — Melhor em Campo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#d4d4d4;padding:0;max-width:500px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:16px 12px 10px;background:#111;border-bottom:1px solid #333}
.header h1{font-size:18px;font-weight:900;color:#fff;margin-bottom:2px}
.header .pelada-info{font-size:11px;color:#e94560;font-weight:700;margin-bottom:4px}
.header p{font-size:10px;color:#888;line-height:1.3}
.name-bar{display:flex;gap:6px;padding:8px 12px;background:#111;border-bottom:1px solid #222}
.name-bar input{flex:1;height:36px;border:2px solid #333;border-radius:10px;padding:0 12px;font-size:14px;font-weight:600;background:#1a1a1a;color:#fff}
.name-bar input:focus{border-color:#e94560;outline:none}
.name-bar input::placeholder{color:#555}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px}
.section-title{font-size:10px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px}
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.player-btn{padding:14px 10px;border:2px solid #333;border-radius:10px;background:#1a1a1a;color:#ccc;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.player-btn:active{transform:scale(0.96)}
.player-btn.selected{border-color:#ffd700;background:#2a2a00;color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,0.2)}
.player-btn .star{display:none;font-size:16px}
.player-btn.selected .star{display:inline}
.guest-bar{display:flex;gap:6px;padding:0 0 10px}
.guest-bar input{flex:1;height:34px;border:2px solid #333;border-radius:8px;padding:0 10px;font-size:13px;background:#1a1a1a;color:#fff}
.guest-bar input:focus{border-color:#e94560;outline:none}
.guest-bar input::placeholder{color:#555}
.guest-bar button{padding:0 14px;border:none;border-radius:8px;background:#e94560;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.btn-bar{padding:10px 12px 20px;background:#111;border-top:1px solid #222;display:flex;gap:8px}
.btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer}
.btn-copy{background:#ffd700;color:#000}
.btn-copy:disabled{background:#333;color:#555}
.btn-clear{background:#1a1a1a;color:#888;border:1px solid #333}
.result{text-align:center;padding:12px;margin:8px 0;background:#1a1a00;border:2px solid #ffd700;border-radius:10px;display:none}
.result-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px}
.result-name{font-size:22px;font-weight:900;color:#ffd700;margin:4px 0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#ffd700;color:#000;padding:10px 24px;border-radius:20px;font-weight:700;font-size:13px;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
<h1>Melhor em Campo</h1>
<div class="pelada-info" id="pelada-info"></div>
<p>Quem foi o destaque da pelada de hoje?<br>Escolha UM jogador. Não vale votar em si mesmo.</p>
</div>

<div class="name-bar">
<input type="text" id="voter-name" placeholder="Seu nome (obrigatório)" autocomplete="off">
</div>

<div class="content">
<div class="result" id="result-box">
<div class="result-label">Seu voto</div>
<div class="result-name" id="result-name"></div>
</div>

<div class="section-title">Jogadores</div>
<div class="player-grid" id="player-grid"></div>

<div class="section-title">Convidado (se não está na lista)</div>
<div class="guest-bar">
<input type="text" id="guest-input" placeholder="Nome do convidado..." autocomplete="off">
<button onclick="addGuest()">+</button>
</div>
</div>

<div class="btn-bar">
<button class="btn btn-clear" onclick="clearVote()">Limpar</button>
<button class="btn btn-copy" id="btn-copy" onclick="copyVote()" disabled>Copiar Voto</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ CONFIG — edit these each week ═══
const PELADA = {
    number: 2,
    total: 12,
    date: "4 Abr 2026",
    saveKey: "2026-04-04",
};

const PLAYERS = [
    "Anderson Aiziro","Arthur Mendes","Bruno Stuani","Carlos Moro",
    "Donizete Pereira","Eduardo Fernandes","Eric Van Thorre",
    "Fabricio Voznika","Glaydston Brito","Guilherme Souza",
    "Joel Pereira","Jose Saraiva","Leeman Abdulai","Leonardo Facci",
    "Lucas Maia","Luigi","Marcone Oliveira","Paulinho de Souza",
    "Rodrigo Barba","Rodrigo Rocha","Roger Stanev",
    "Vini Cristenson","Welington Campos","Wesley da Silva"
];
// ═══════════════════════════════════════

let selected = null;
let guests = [];

// Header
document.getElementById("pelada-info").textContent = 
    `Pelada ${PELADA.number} de ${PELADA.total} — ${PELADA.date}`;

function getAllPlayers() {
    return [...PLAYERS, ...guests].sort();
}

function renderGrid() {
    const grid = document.getElementById("player-grid");
    grid.innerHTML = "";
    getAllPlayers().forEach(name => {
        const btn = document.createElement("button");
        btn.className = "player-btn" + (selected === name ? " selected" : "");
        btn.innerHTML = `<span class="star">⭐ </span>${name}`;
        btn.addEventListener("click", () => selectPlayer(name));
        grid.appendChild(btn);
    });
    
    const resultBox = document.getElementById("result-box");
    const resultName = document.getElementById("result-name");
    if (selected) {
        resultBox.style.display = "block";
        resultName.textContent = selected;
    } else {
        resultBox.style.display = "none";
    }
    
    document.getElementById("btn-copy").disabled = !selected;
    saveState();
}

function selectPlayer(name) {
    selected = (selected === name) ? null : name;
    renderGrid();
}

function addGuest() {
    const input = document.getElementById("guest-input");
    const name = input.value.trim();
    if (!name) return;
    if (!guests.includes(name)) guests.push(name);
    input.value = "";
    renderGrid();
}

function clearVote() {
    selected = null;
    renderGrid();
}

function copyVote() {
    const voter = document.getElementById("voter-name").value.trim();
    if (!voter) {
        showToast("Preencha seu nome!");
        document.getElementById("voter-name").focus();
        return;
    }
    if (!selected) {
        showToast("Escolha um jogador!");
        return;
    }
    
    const text = `Pelada ${PELADA.number} de ${PELADA.total} - ${PELADA.date}\nMelhor em Campo\n\nVoto de: ${voter}\nDestaque: ${selected}`;
    
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text)
            .then(() => showToast("Copiado! Cola no WhatsApp do Amador."))
            .catch(() => { fallbackCopy(text); showToast("Copiado!"); });
    } else {
        fallbackCopy(text);
        showToast("Copiado!");
    }
}

function fallbackCopy(text) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.left = "-9999px";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta);
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}

// localStorage
const SAVE_KEY = `mvp_p${PELADA.number}_${PELADA.saveKey}`;
function saveState() {
    try {
        const voter = document.getElementById("voter-name").value;
        localStorage.setItem(SAVE_KEY, JSON.stringify({ selected, voter, guests }));
    } catch(e) {}
}
function restoreState() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        if (state.selected) selected = state.selected;
        if (state.voter) document.getElementById("voter-name").value = state.voter;
        if (state.guests) guests = state.guests;
    } catch(e) {}
}

document.getElementById("voter-name").addEventListener("input", saveState);
document.getElementById("guest-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") addGuest();
});

restoreState();
renderGrid();
</script>
</body>
</html>
